name: MERN CI

on:
  push:
    branches: [main]

jobs:
  mongo-init:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo
        ports: ["27017:27017"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Waiting for mongodb to be ready
        run: |
          until nc -z localhost 27017; do
            echo "Waiting for mongoDB..."
            sleep 2
          done
          echo "MongoDB is up"

      - name: Seed MongoDB
        working-directory: ./backend
        run: |
          npm install
          node seedTasksData.js

  test:
    runs-on: ubuntu-latest
    needs: mongo-init

    services:
      mongo:
        image: mongo
        ports: ["27017:27017"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Wait for MongoDB
        run: |
          until nc -z localhost 27017; do
            echo "Waiting for mongoDB..."
            sleep 2
          done

      - name: Install dependency for backend
        working-directory: ./backend
        run: npm install

      - name: Seed MongoDB (for test)
        working-directory: ./backend
        run: node seedTasksData.js

      - name: Running backend test
        working-directory: ./backend
        run: npm test